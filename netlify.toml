# Mellow Co. — Netlify Configuration
[[redirects]]
  from = "https://mellow-co.netlify.app"
  to   = "https://mellow-co.netlify.app/"
  status = 301
  force  = true
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# /api/* routes → serverless function (force=true ensures it takes priority)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# Admin panel — block search engines from indexing it
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
