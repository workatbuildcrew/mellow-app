<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mellow Co. — Admin Panel</title>
  <link rel="icon" type="image/svg+xml" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRP-uq7xU6FATSkp6EY7HNCTi4lgIlG4TmTkQ&s,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%234a2c0a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='38' font-weight='900' fill='%23c8a96e'>M</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown:     #4a2c0a;
      --brown-mid: #7a4f2a;
      --brown-lt:  #a67c52;
      --gold:      #c8a96e;
      --gold-dk:   #9d7a45;
      --cream:     #f5f0e8;
      --cream-dk:  #e8dfd0;
      --white:     #fffef8;
      --ink:       #1a0f05;
      --green:     #2d7a4a;
      --red:       #8b1a1a;
      --sidebar-w: 240px;
    }
    body {
      font-family: 'Georgia', serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ═══════════════════════════════════════════
       LOGIN SCREEN
    ═══════════════════════════════════════════ */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4a2c0a 0%, #7a4f2a 60%, #4a2c0a 100%);
    }
    .login-card {
      background: var(--white);
      border-top: 4px solid var(--gold);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-logo h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--brown);
    }
    .login-logo h1 span { color: var(--gold-dk); font-style: italic; }
    .login-logo p {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown-lt);
      margin-top: 4px;
    }
    .login-field { margin-bottom: 1rem; }
    .login-field label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brown-mid);
      margin-bottom: 0.35rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--cream-dk);
      background: var(--cream);
      font-size: 1rem;
      color: var(--brown);
      outline: none;
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--brown);
      color: var(--white);
      border: 1px solid var(--gold);
      font-size: 1rem;
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--gold-dk); }
    .login-err {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 0.6rem;
      font-style: italic;
    }

    /* ═══════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════ */
    #app { display: none; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: linear-gradient(180deg, #4a2c0a 0%, #3a1f05 100%);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 1.4rem 1.2rem;
      border-bottom: 1px solid rgba(200,169,110,0.2);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .sidebar-logo img {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--gold);
      object-fit: cover;
    }
    .sidebar-logo-text {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--white);
    }
    .sidebar-logo-text span { color: var(--gold); font-style: italic; }
    .sidebar-badge {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(200,169,110,0.6);
      padding-left: 0.2rem;
    }
    .nav-section {
      padding: 0.8rem 0.8rem 0.3rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(200,169,110,0.45);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 1.2rem;
      color: rgba(255,254,248,0.7);
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: rgba(200,169,110,0.1); color: var(--white); }
    .nav-item.active {
      background: rgba(200,169,110,0.15);
      color: var(--gold);
      border-left-color: var(--gold);
    }
    .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-bottom {
      margin-top: auto;
      padding: 1rem;
      border-top: 1px solid rgba(200,169,110,0.15);
    }
    .logout-btn {
      width: 100%;
      padding: 0.6rem;
      background: none;
      border: 1px solid rgba(200,169,110,0.3);
      color: rgba(200,169,110,0.7);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Main Content */
    .main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--cream-dk);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brown);
      font-family: 'Georgia', serif;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.82rem;
      color: var(--brown-lt);
    }
    .admin-tag {
      background: var(--brown);
      color: var(--gold);
      padding: 0.25rem 0.7rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .content { padding: 2rem; flex: 1; }

    /* ═══════════════════════════════════════════
       LOADING
    ═══════════════════════════════════════════ */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--cream-dk);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 3rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-wrap { text-align: center; padding: 3rem; }
    .loading-wrap p { color: var(--brown-lt); font-style: italic; margin-top: 1rem; }

    /* ═══════════════════════════════════════════
       STAT CARDS
    ═══════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--cream-dk);
      border-top: 3px solid var(--gold);
      padding: 1.3rem 1.5rem;
    }
    .stat-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brown-lt);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--brown);
      font-family: 'Georgia', serif;
    }
    .stat-sub {
      font-size: 0.78rem;
      color: var(--brown-lt);
      margin-top: 0.3rem;
      font-style: italic;
    }
    .stat-accent { color: var(--gold-dk); }

    /* ═══════════════════════════════════════════
       CHART AREA
    ═══════════════════════════════════════════ */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .chart-card {
      background: var(--white);
      border: 1px solid var(--cream-dk);
      border-top: 3px solid var(--gold);
      padding: 1.3rem 1.5rem;
    }
    .chart-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chart-container { position: relative; height: 220px; }

    /* ═══════════════════════════════════════════
       TABLES
    ═══════════════════════════════════════════ */
    .panel {
      background: var(--white);
      border: 1px solid var(--cream-dk);
      border-top: 3px solid var(--gold);
      margin-bottom: 1.5rem;
    }
    .panel-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--cream-dk);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
    }
    .panel-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .filter-select {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--cream-dk);
      background: var(--cream);
      font-size: 0.82rem;
      color: var(--brown);
      outline: none;
    }
    .search-box {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--cream-dk);
      background: var(--cream);
      font-size: 0.82rem;
      color: var(--brown);
      outline: none;
      width: 200px;
    }
    .search-box:focus { border-color: var(--gold); }
    .btn-sm {
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      border: 1px solid var(--cream-dk);
      background: var(--cream);
      color: var(--brown-mid);
      transition: all 0.15s;
    }
    .btn-sm:hover { background: var(--cream-dk); }
    .btn-sm.primary {
      background: var(--brown);
      color: var(--white);
      border-color: var(--gold);
    }
    .btn-sm.primary:hover { background: var(--gold-dk); }
    .btn-sm.success {
      background: #e8f5ec;
      color: #1a5c35;
      border-color: #a0d0b0;
    }
    .btn-sm.success:hover { background: #c8ecd6; }
    .btn-sm.danger {
      background: #fef5f5;
      color: var(--red);
      border-color: #e0a0a0;
    }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown-lt);
      font-weight: 600;
      background: var(--cream);
      border-bottom: 1px solid var(--cream-dk);
      white-space: nowrap;
    }
    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--cream-dk);
      font-size: 0.88rem;
      color: var(--brown);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--cream); }

    /* ═══════════════════════════════════════════
       BADGES
    ═══════════════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 0.72rem;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-pending   { background: #fff8e8; color: #9d7a45; border: 1px solid #e8d5a0; }
    .badge-paid      { background: #e8f5ec; color: #1a5c35; border: 1px solid #a0d0b0; }
    .badge-confirmed { background: #fff8e8; color: #9d7a45; border: 1px solid #e8d5a0; }
    .badge-delivered { background: #e8f5ec; color: #1a5c35; border: 1px solid #a0d0b0; }
    .badge-cancelled { background: #fef5f5; color: #8b1a1a; border: 1px solid #e0a0a0; }
    .badge-upi       { background: #e8f0fe; color: #1a4a9d; border: 1px solid #a0b8e0; }
    .badge-cod       { background: #fff3e0; color: #8b5e00; border: 1px solid #e0c880; }
    .badge-card      { background: #f3e8fe; color: #5c1a8b; border: 1px solid #c0a0e0; }

    /* ═══════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,15,5,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: var(--white);
      border-top: 4px solid var(--gold);
      max-width: 900px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--cream-dk);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 10;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brown);
    }
    .modal-close {
      background: none;
      border: 1px solid var(--cream-dk);
      color: var(--brown-lt);
      width: 30px;
      height: 30px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: var(--cream); }
    .modal-body { padding: 1.5rem; }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--cream-dk);
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
    }

    /* ═══════════════════════════════════════════
       ORDER DETAIL MODAL
    ═══════════════════════════════════════════ */
    .order-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .detail-section {
      background: var(--cream);
      border: 1px solid var(--cream-dk);
      border-left: 3px solid var(--gold);
      padding: 1rem;
    }
    .detail-section h4 {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brown-lt);
      margin-bottom: 0.7rem;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      padding: 0.25rem 0;
      border-bottom: 1px solid var(--cream-dk);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: var(--brown-lt); }
    .detail-row span:last-child { color: var(--brown); font-weight: 600; }

    /* Customer detail panel */
    .customer-orders-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .cust-order-card {
      background: var(--white);
      border: 1px solid var(--cream-dk);
      border-left: 3px solid var(--gold);
      padding: 1rem;
    }

    /* ═══════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════ */
    #admin-toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--brown);
      color: var(--white);
      padding: 0.8rem 1.4rem;
      font-size: 0.9rem;
      border: 1px solid var(--gold);
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    #admin-toast.show { opacity: 1; transform: translateY(0); }

    /* ═══════════════════════════════════════════
       MISC
    ═══════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--brown-lt);
      font-style: italic;
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .flex-row { display: flex; align-items: center; gap: 0.6rem; }
    .mt-1 { margin-top: 0.5rem; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      background: none;
      border: 1px solid var(--cream-dk);
      color: var(--brown-mid);
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
      transition: all 0.15s;
    }
    .back-btn:hover { background: var(--cream); }
    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .date-input {
      padding: 0.4rem 0.7rem;
      border: 1px solid var(--cream-dk);
      background: var(--cream);
      font-size: 0.82rem;
      color: var(--brown);
      outline: none;
    }

    /* ═══════════════════════════════════════════
       COMPLETE UI SYSTEM — Dashboard-consistent layout,
       rounded corners, full-width panels for all sections
    ═══════════════════════════════════════════ */

    /* Full screen layout */
    html, body { height: 100%; overflow: hidden; }
    #app { height: 100vh; overflow: hidden; display: flex; }
    .main { display: flex; flex-direction: column; height: 100vh; overflow: hidden; flex: 1; }
    .content { flex: 1; overflow-y: auto; padding: 1.8rem 2rem; }

    /* Scrollbars */
    .content::-webkit-scrollbar  { width: 6px; }
    .content::-webkit-scrollbar-track  { background: var(--cream); }
    .content::-webkit-scrollbar-thumb  { background: var(--cream-dk); border-radius: 3px; }
    .sidebar::-webkit-scrollbar        { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb  { background: rgba(200,169,110,0.3); }
    .sidebar { overflow-y: auto; overflow-x: hidden; }

    /* Topbar — improved */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--cream-dk);
      padding: 0 2rem;
      height: 58px; min-height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(74,44,10,0.07);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 700; color: var(--brown);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .topbar-title::before {
      content: ''; display: inline-block; width: 3px; height: 20px;
      background: var(--gold); border-radius: 2px;
    }
    .topbar-right { display: flex; align-items: center; gap: 0.8rem; }

    /* ── ROUNDED CORNERS — applied globally ── */
    .admin-tag       { border-radius: 6px; }
    .stat-card       { border-radius: 10px; }
    .panel           { border-radius: 10px; overflow: hidden; }
    .chart-card      { border-radius: 10px; border-top: 3px solid var(--gold); }
    .login-card      { border-radius: 14px; }
    .modal           { border-radius: 10px; }
    .detail-section  { border-radius: 8px; }
    .cust-order-card { border-radius: 8px; }
    .badge           { border-radius: 20px; }
    #admin-toast     { border-radius: 8px; }
    .btn-sm          { border-radius: 6px; }
    .back-btn        { border-radius: 6px; }
    .logout-btn      { border-radius: 6px; }
    .login-btn       { border-radius: 6px; }
    .login-field input { border-radius: 6px; }
    .search-box      { border-radius: 6px; }
    .filter-select   { border-radius: 6px; }
    .date-input      { border-radius: 6px; }
    .modal-close     { border-radius: 6px; }
    .empty-state     { border-radius: 8px; }
    .nav-item        { border-radius: 0 6px 6px 0; margin: 1px 8px 1px 0; }

    /* ── STAT CARDS ── */
    .stat-card {
      background: var(--white);
      border: 1px solid var(--cream-dk);
      border-top: 3px solid var(--gold);
      padding: 1.4rem 1.6rem;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .stat-card:hover { box-shadow: 0 6px 20px rgba(74,44,10,0.1); transform: translateY(-2px); }

    /* ── PANELS — full width, dashboard-consistent ── */
    .panel {
      background: var(--white);
      border: 1px solid var(--cream-dk);
      border-top: 3px solid var(--gold);
      margin-bottom: 1.5rem;
      width: 100%; box-sizing: border-box;

/* ══════════════════════════════════════
   CSV DOWNLOAD UTILITY
══════════════════════════════════════ */
function downloadCSV(data, filename) {
  if (!data || !data.length) { toast('No data to export'); return; }
  const cols = Object.keys(data[0]);
  const escape = v => {
    if (v === null || v === undefined) return '';
    const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n')
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const rows = [cols.join(','), ...data.map(row => cols.map(c => escape(row[c])).join(','))];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('✅ CSV downloaded: ' + filename);
}

/* Direct Supabase call with service role (bypasses RLS) */
async function sbQuery(method, path, body) {
  const res = await fetch(SUPABASE_URL + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_SVC,
      'Authorization': 'Bearer ' + SUPABASE_SVC,
      ...(method !== 'GET' ? { 'Prefer': 'return=representation' } : {}),
    },
    ...(body ? { body: JSON.stringify(body) } : {}),
  });
  return res.json();
}

async function renderDashboard() {

    const d = new Date();
    d.setDate(d.getDate() - i);

    return d >= weekAgo;
  });

      </div>

      </div>
      <div class="stat-card">
        <div class="stat-label">Pending COD</div>
        <div class="stat-value" style="color:var(--red)">${pendingCOD.length}</div>
        <div class="stat-sub">Awaiting delivery confirmation</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">COD Orders</div>
        <div class="stat-value">${pmCounts.cod}</div>
        <div class="stat-sub">Cash on Delivery</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">UPI / Card</div>

        <div class="stat-sub">${pmCounts.upi} UPI · ${pmCounts.card} Card</div>

    </div>

    <!-- CHARTS -->

      <div class="chart-card">

          <span style="font-size:0.75rem;font-weight:400;color:var(--brown-lt)">Count & Revenue</span>
        </div>
        <div class="chart-container">
          <canvas id="chart-daily"></canvas>

      </div>

        <div class="chart-container">

async function renderOrders(filter='all', dateFrom='', dateTo='', search='') {
  let path = '/rest/v1/orders?select=*&order=created_at.desc';
  if (filter === 'cod')     path += '&payment_method=eq.cod';
  if (filter === 'upi')     path += '&payment_method=eq.upi';
  if (filter === 'pending') path += '&payment_status=eq.pending';
  if (filter === 'paid')    path += '&payment_status=eq.paid';
  if (dateFrom) path += `&created_at=gte.${dateFrom}T00:00:00`;
  if (dateTo)   path += `&created_at=lte.${dateTo}T23:59:59`;

  const data = await sbQuery('GET', path);
  let orders = Array.isArray(data) ? data : [];

  // Client-side search
  if (search) {
    const s = search.toLowerCase();
    orders = orders.filter(o =>
      (o.order_id||'').toLowerCase().includes(s) ||
      (o.customer_name||'').toLowerCase().includes(s) ||
      (o.customer_email||'').toLowerCase().includes(s) ||
      (o.customer_phone||'').includes(s)
    );
  }

  document.getElementById('page-content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">All Orders (${orders.length})</div>
        <div class="panel-actions">
          <button class="btn-sm primary" onclick="exportOrdersCSV()">⬇ Export CSV</button>
          <input class="search-box" type="text" placeholder="Search name, email, order ID…"
            value="${esc(search)}" oninput="renderOrders('${filter}','${dateFrom}','${dateTo}',this.value)" />
          <input type="date" class="date-input" value="${dateFrom}"
            onchange="renderOrders('${filter}',this.value,'${dateTo}','${search}')"
            title="From date" />
          <input type="date" class="date-input" value="${dateTo}"
            onchange="renderOrders('${filter}','${dateFrom}',this.value,'${search}')"
            title="To date" />
          <select class="filter-select" onchange="renderOrders(this.value,'${dateFrom}','${dateTo}','${search}')">
            <option value="all"     ${filter==='all'    ?'selected':''}>All Methods</option>
            <option value="cod"     ${filter==='cod'    ?'selected':''}>COD Only</option>
            <option value="upi"     ${filter==='upi'    ?'selected':''}>UPI Only</option>
            <option value="pending" ${filter==='pending'?'selected':''}>Pending Payment</option>
            <option value="paid"    ${filter==='paid'   ?'selected':''}>Paid</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Order ID</th><th>Customer</th><th>City</th>
            <th>Total</th><th>Payment</th><th>Pay Status</th>
            <th>Order Status</th><th>Date</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${orders.length ? orders.map(o => orderRow(o)).join('') :
              `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">📦</div>No orders found</div></td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

/* ── Export current filtered orders as CSV ── */
async function exportOrdersCSV() {
  const data = await sbQuery('GET', '/rest/v1/orders?select=*&order=created_at.desc');
  const orders = Array.isArray(data) ? data : [];
  const flat = orders.map(o => ({
    order_id: o.order_id,
    customer_name: o.customer_name,
    customer_email: o.customer_email,
    customer_phone: o.customer_phone || '',
    delivery_address: o.delivery_address || '',
    delivery_city: o.delivery_city || '',
    delivery_state: o.delivery_state || '',
    delivery_pin: o.delivery_pin || '',
    subtotal: o.subtotal || 0,
    delivery_charge: o.delivery_charge || 0,
    tax: o.tax || 0,
    discount_amount: o.discount_amount || 0,
    discount_code: o.discount_code || '',
    total: o.total || 0,
    payment_method: o.payment_method || '',
    payment_status: o.payment_status || '',
    order_status: o.status || '',
    payment_id: o.payment_id || '',
    created_at: o.created_at || '',
  }));
  downloadCSV(flat, `mellow-orders-${new Date().toISOString().slice(0,10)}.csv`);
}

  const payBadge = `<span class="badge badge-${o.payment_status}">${o.payment_status==='paid'?'✅ Paid':'⏳ Pending'}</span>`;
  const stBadge  = `<span class="badge badge-${o.status}">${o.status||'confirmed'}</span>`;
  return `<tr>
    <td><strong style="color:var(--brown)">#${esc(o.order_id)}</strong></td>
    <td>
      <div style="font-weight:600;color:var(--brown)">${esc(o.customer_name)}</div>

}

async function confirmCODPaid(orderId) {
  if (!confirm(`Confirm that cash was received for order #${orderId}?\nThis will mark it as PAID and DELIVERED and send a delivery email to the customer.`)) return;
  try {
    const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8000' : '';
    const res  = await fetch(`${apiBase}/api/confirm-cod-payment`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ order_id: orderId }),
    });
    const data = await res.json();
    if (data.ok) {
      toast(`✅ Order #${orderId} marked Paid + Delivered — delivery email sent to customer`);
    } else {
      throw new Error(data.error || 'API call failed');
    }
  } catch(err) {
    // Fallback: direct patch
    await sbQuery('PATCH', `/rest/v1/orders?order_id=eq.${orderId}`, {
      payment_status: 'paid',
      status: 'delivered',
      updated_at: new Date().toISOString(),
    });
    toast(`✅ Order #${orderId} marked as Paid + Delivered`);
  }
  renderCOD();
}

let _customersCache = null;
let _allOrdersCache = null;

async function renderCustomers(search='') {
  const [usersData, ordersData] = await Promise.all([
    sbQuery('GET', '/rest/v1/users?select=*&order=created_at.desc'),
    sbQuery('GET', '/rest/v1/orders?select=order_id,user_id,customer_email,customer_name,total,status,payment_status,payment_method,created_at,items,delivery_city,delivery_state&order=created_at.desc'),
  ]);

  _customersCache = Array.isArray(usersData) ? usersData : [];
  _allOrdersCache = Array.isArray(ordersData) ? ordersData : [];

  let customers = _customersCache;
  if (search) {
    const s = search.toLowerCase();
    customers = customers.filter(c =>
      (c.name||'').toLowerCase().includes(s) ||
      (c.email||'').toLowerCase().includes(s) ||
      (c.phone||'').includes(s)
    );
  }

  // Build order counts per user
  const orderMap = {};
  _allOrdersCache.forEach(o => {
    if (o.user_id) {
      if (!orderMap[o.user_id]) orderMap[o.user_id] = { count:0, total:0 };
      orderMap[o.user_id].count++;
      orderMap[o.user_id].total += (o.total||0);
    }
  });

  document.getElementById('page-content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">All Customers (${customers.length})</div>
        <div class="panel-actions">
          <button class="btn-sm primary" onclick="exportCustomersCSV()">⬇ Export CSV</button>
          <input class="search-box" type="text" placeholder="Search name, email, phone…"
            value="${esc(search)}" oninput="renderCustomers(this.value)" />
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Name</th><th>Email</th><th>Phone</th>
            <th>Orders</th><th>Total Spent</th><th>Joined</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${customers.length ? customers.map(c => {
              const stats = orderMap[c.id] || {count:0,total:0};
              return `<tr>
                <td><strong style="color:var(--brown)">${esc(c.name||'—')}</strong></td>
                <td style="font-size:0.82rem">${esc(c.email)}</td>
                <td style="font-family:monospace;font-size:0.82rem">${esc(c.phone||'—')}</td>
                <td style="font-weight:700;color:var(--brown)">${stats.count}</td>
                <td style="font-weight:700;color:var(--gold-dk)">${fmt(stats.total)}</td>
                <td style="font-size:0.78rem;color:var(--brown-lt)">${fmtDate(c.created_at)}</td>
                <td>
                  <button class="btn-sm primary" onclick="openCustomerDetail('${c.id}')">📋 Orders</button>
                </td>
              </tr>`;
            }).join('') :
              `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div>No customers found</div></td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function updateOrderStatus(orderId) {
  const status         = document.getElementById('status-select')?.value;
  const payment_status = document.getElementById('paystatus-select')?.value;

  // If marking as delivered + paid, route through API so delivery email fires
  if (status === 'delivered' && payment_status === 'paid') {
    try {
      const apiBase = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:8000' : '';
      const res  = await fetch(`${apiBase}/api/confirm-cod-payment`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ order_id: orderId }),
      });
      const data = await res.json();
      if (data.ok) {
        toast(`✅ Order #${orderId} marked Delivered — customer email sent`);
      } else {
        throw new Error(data.error || 'API call failed');
      }
    } catch(err) {
      // Fallback: direct Supabase patch (email won't fire but status updates)
      await sbQuery('PATCH', `/rest/v1/orders?order_id=eq.${orderId}`, {
        status, payment_status, updated_at: new Date().toISOString()
      });
      toast(`✅ Order #${orderId} status updated (email may not have sent: ${err.message})`);
    }
  } else {
    await sbQuery('PATCH', `/rest/v1/orders?order_id=eq.${orderId}`, {
      status, payment_status, updated_at: new Date().toISOString()
    });
    toast(`✅ Order #${orderId} status updated`);
  }
  closeModal();
}

            <td style="text-align:right;font-weight:700">₹${Number(i.total||0).toLocaleString('en-IN')}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="totals">
        <div class="total-row"><span>Subtotal</span><span>₹${Number(o.subtotal||0).toLocaleString('en-IN')}</span></div>
        <div class="total-row"><span>Delivery</span><span>${(o.delivery_charge||0)===0?'FREE':'₹'+Number(o.delivery_charge).toLocaleString('en-IN')}</span></div>
        <div class="total-row"><span>GST (5%)</span><span>₹${Number(o.tax||0).toLocaleString('en-IN')}</span></div>
        ${(o.discount_amount||0)>0?`<div class="total-row" style="color:#2d7a4a"><span>Discount${o.discount_code?' ('+o.discount_code+')':''}</span><span>-₹${Number(o.discount_amount).toLocaleString('en-IN')}</span></div>`:''}
        <div class="grand-total"><span>Grand Total</span><span>₹${Number(o.total||0).toLocaleString('en-IN')}</span></div>
      </div>
      <div class="footer">
        ✦ Thank you for choosing Mellow Co. ✦<br/>
        This is a computer-generated invoice. No signature required.<br/>
        Coimbatore, Tamil Nadu, India · hello@mellowco.in
      </div>
    </div>
  </body></html>`);
  win.document.close();
}

async function createDiscountCode() {
  const code      = (document.getElementById('new-code-val')?.value   || '').trim().toUpperCase();
  const email     = (document.getElementById('new-code-email')?.value || '').trim().toLowerCase();
  const pct       = parseInt(document.getElementById('new-code-pct')?.value || '10');
  const codeType  = document.getElementById('new-code-type')?.value || 'single';
  const isReusable = codeType === 'reusable';

  // email is optional — blank means usable by any customer
  const emailVal = email || 'all';
  if (!code) { toast('❌ Code is required'); return; }
  if (!code.match(/^[A-Z0-9]+$/)) { toast('❌ Code must be letters/numbers only'); return; }
  if (pct < 1 || pct > 99) { toast('❌ Discount must be 1–99%'); return; }

  // Reusable codes get a far-future expiry (10 years); single-use get 30 days
  const exp = isReusable
    ? new Date(Date.now() + 10 * 365 * 24 * 60 * 60 * 1000).toISOString()
    : new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString();

  const result = await sbQuery('POST', '/rest/v1/discount_codes', {
    code,
    user_email:       emailVal,
    discount_percent: pct,
    is_used:          false,
    reusable:         isReusable,
    expires_at:       exp,
  });
  if (Array.isArray(result) || (result && !result.code)) {
    const typeLabel = isReusable ? 'reusable (unlimited uses)' : 'single-use';
    toast(`✅ Code ${code} created — ${pct}% off · ${typeLabel}`);
    renderDiscounts();
  } else {
    toast('❌ ' + (result?.message || result?.details || 'Failed — code may already exist'));
  }
}

/* Revoke (delete) a discount code */
async function revokeDiscountCode(id, code) {
  if (!confirm(`Revoke code "${code}"? This cannot be undone.`)) return;
  const result = await sbQuery('DELETE', `/rest/v1/discount_codes?id=eq.${id}`);
  toast(`🗑 Code ${code} revoked`);
  renderDiscounts();
}

function openModal(html) {
  const wrap = document.getElementById('modal-container');
  wrap.innerHTML = `
    <div class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal">${html}</div>
    </div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}
function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
